<!DOCTYPE html>
<html lang="pt-BR" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Confirme seu e-mail — Nexlabel</title>
  <style>
    @media only screen and (max-width: 600px) {
      .container { width: 100% !important; padding: 16px !important; }
      .card { padding: 32px 24px !important; border-radius: 12px !important; }
      .otp { font-size: 34px !important; letter-spacing: 8px !important; }
    }
    @media (prefers-color-scheme: dark) {
      .outer { background-color: #09090b !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" class="outer" style="background-color:#f4f4f6;">
    <tr>
      <td align="center" style="padding:40px 16px;">

        <!-- Card -->
        <table role="presentation" class="container" width="560" cellpadding="0" cellspacing="0" style="background-color:#18181b;border-radius:16px;overflow:hidden;box-shadow:0 4px 32px rgba(0,0,0,0.4);">

          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg,#4f0a9e 0%,#7c3aed 100%);padding:32px 40px 28px;text-align:center;">
              <div style="display:inline-block;background:rgba(255,255,255,0.15);border-radius:12px;padding:10px 20px;">
                <span style="font-size:22px;font-weight:800;color:#ffffff;letter-spacing:-0.5px;">Nexlabel</span>
              </div>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td class="card" style="padding:40px 40px 32px;">

              <!-- Icon -->
              <div style="text-align:center;margin-bottom:24px;">
                <div style="display:inline-block;background:#3f3f46;border-radius:50%;width:56px;height:56px;line-height:56px;text-align:center;font-size:28px;">
                  ✉️
                </div>
              </div>

              <!-- Heading -->
              <h1 style="margin:0 0 8px;font-size:22px;font-weight:700;color:#fafafa;text-align:center;letter-spacing:-0.3px;">
                Confirme seu e-mail
              </h1>
              <p style="margin:0 0 28px;font-size:15px;color:#a1a1aa;text-align:center;line-height:1.6;">
                Use o código abaixo para ativar sua conta no <strong style="color:#d4d4d8;">Nexlabel</strong>.
              </p>

              <!-- Código OTP -->
              <div style="text-align:center;margin-bottom:28px;">
                <p style="margin:0 0 12px;font-size:13px;color:#71717a;letter-spacing:0.03em;">
                  Digite este código na tela de verificação
                </p>
                <div style="display:inline-block;background:#09090b;border:2px solid #4c1d95;border-radius:14px;padding:22px 40px;">
                  <span class="otp" style="font-family:'Courier New',Courier,'Lucida Console',monospace;font-size:42px;font-weight:700;letter-spacing:10px;color:#a78bfa;">
                    {{ .Token }}
                  </span>
                </div>
                <p style="margin:12px 0 0;font-size:12px;color:#52525b;">
                  Expira em <strong style="color:#71717a;">1 hora</strong>
                </p>
              </div>

            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding:0 40px;">
              <div style="border-top:1px solid #27272a;"></div>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:24px 40px 32px;">
              <p style="margin:0 0 6px;font-size:12px;color:#52525b;text-align:center;">
                Se você não criou uma conta no Nexlabel, ignore este e-mail.
              </p>
              <p style="margin:0;font-size:12px;color:#3f3f46;text-align:center;">
                © 2025 Nexlabel · Todos os direitos reservados
              </p>
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
